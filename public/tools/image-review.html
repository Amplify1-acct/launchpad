<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Exsisto — Image Library Review</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:rgba(255,255,255,0.07);
  --accent:#6366f1;--gold:#f59e0b;--green:#10b981;--red:#ef4444;
  --text:#f1f1f5;--mid:#9090a8;--dim:#555568;
}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

header{padding:14px 24px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.logo{font-size:15px;font-weight:800;}.logo span{color:var(--accent);}
.header-right{display:flex;align-items:center;gap:12px;}
.flag-count{font-size:11px;font-weight:700;background:rgba(239,68,68,0.1);color:var(--red);border:1px solid rgba(239,68,68,0.2);padding:4px 10px;border-radius:6px;font-family:'JetBrains Mono',monospace;}
.export-btn{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:7px 14px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Sora',sans-serif;}
.export-btn:hover{opacity:0.85;}

.stats-bar{display:flex;gap:16px;flex-wrap:wrap;padding:10px 24px;background:var(--surface);border-bottom:1px solid var(--border);}
.stat{font-size:11px;color:var(--mid);}.stat strong{color:var(--text);font-weight:700;}
.stat.red strong{color:var(--red);}.stat.green strong{color:var(--green);}

.filterbar{padding:10px 24px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.fb-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim);margin-right:4px;font-family:'JetBrains Mono',monospace;}
.fb-btn{background:var(--surface2);border:1.5px solid var(--border);border-radius:6px;padding:5px 12px;font-size:11px;font-weight:600;color:var(--mid);cursor:pointer;transition:all 0.12s;font-family:'Sora',sans-serif;}
.fb-btn:hover{border-color:var(--accent);color:var(--text);}
.fb-btn.active{border-color:var(--accent);background:rgba(99,102,241,0.12);color:var(--accent);}
.fb-btn.flagged-filter.active{border-color:var(--red);background:rgba(239,68,68,0.1);color:var(--red);}
.sep{width:1px;height:20px;background:var(--border);margin:0 4px;}

.content{padding:24px;}
.industry-section{margin-bottom:40px;}
.industry-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.industry-title{font-size:13px;font-weight:700;}
.industry-count{font-size:10px;color:var(--mid);font-family:'JetBrains Mono',monospace;}
.industry-flag-count{font-size:10px;font-weight:700;color:var(--red);display:none;}
.industry-flag-count.visible{display:inline;}

.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;}
.img-card{background:var(--surface);border:2px solid var(--border);border-radius:10px;overflow:hidden;transition:all 0.15s;position:relative;}
.img-card:hover{border-color:rgba(255,255,255,0.15);}
.img-card.flagged{border-color:var(--red);background:rgba(239,68,68,0.04);}
.img-card.approved{border-color:var(--green);background:rgba(16,185,129,0.04);}
.img-card.hidden{display:none;}

.img-wrap{position:relative;overflow:hidden;}
.img-wrap img{width:100%;height:180px;object-fit:cover;display:block;background:var(--surface2);transition:opacity 0.2s;}
.img-card.flagged .img-wrap img{opacity:0.35;}

.status-badge{position:absolute;top:8px;right:8px;padding:3px 8px;border-radius:4px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;}
.status-badge.flagged{background:rgba(239,68,68,0.9);color:#fff;}
.status-badge.approved{background:rgba(16,185,129,0.9);color:#fff;}

.img-info{padding:8px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.img-meta{flex:1;min-width:0;}
.img-industry{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--accent);}
.img-num{font-size:10px;color:var(--mid);margin-top:2px;font-family:'JetBrains Mono',monospace;}

.action-btns{display:flex;gap:5px;flex-shrink:0;}
.action-btn{width:28px;height:28px;border-radius:6px;border:1.5px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all 0.12s;}
.action-btn:hover{transform:scale(1.1);}
.action-btn.flag-btn:hover,.action-btn.flag-btn.active{border-color:var(--red);background:rgba(239,68,68,0.15);}
.action-btn.approve-btn:hover,.action-btn.approve-btn.active{border-color:var(--green);background:rgba(16,185,129,0.15);}

/* Lightbox */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:200;display:none;align-items:center;justify-content:center;}
.lightbox.open{display:flex;}
.lightbox img{max-width:90vw;max-height:85vh;object-fit:contain;border-radius:8px;}
.lb-close{position:absolute;top:20px;right:24px;font-size:28px;cursor:pointer;color:rgba(255,255,255,0.6);background:none;border:none;}
.lb-close:hover{color:#fff;}
.lb-actions{position:absolute;bottom:24px;display:flex;gap:12px;}
.lb-btn{padding:10px 22px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:'Sora',sans-serif;}
.lb-approve{background:var(--green);color:#fff;}
.lb-flag{background:var(--red);color:#fff;}
.lb-skip{background:var(--surface2);color:var(--mid);border:1.5px solid var(--border);}

/* Export modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:none;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;width:560px;max-width:95vw;max-height:80vh;overflow-y:auto;}
.modal-title{font-size:15px;font-weight:800;margin-bottom:4px;}
.modal-sub{font-size:11px;color:var(--mid);margin-bottom:20px;}
.flag-item{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--surface2);border-radius:6px;margin-bottom:5px;}
.flag-item img{width:48px;height:36px;object-fit:cover;border-radius:4px;flex-shrink:0;}
.flag-item-info{flex:1;min-width:0;}
.flag-item-ind{font-size:11px;font-weight:700;color:var(--red);}
.flag-item-url{font-size:9px;color:var(--dim);font-family:'JetBrains Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.empty-flags{color:var(--dim);font-size:12px;text-align:center;padding:20px;}
.modal-close{background:var(--surface2);border:1.5px solid var(--border);border-radius:6px;padding:8px 16px;font-size:12px;font-weight:700;color:var(--mid);cursor:pointer;font-family:'Sora',sans-serif;margin-top:16px;width:100%;}
.copy-btn{background:var(--accent);border:none;border-radius:6px;padding:8px 16px;font-size:11px;font-weight:700;color:#fff;cursor:pointer;font-family:'Sora',sans-serif;margin-top:8px;width:100%;}
</style>
</head>
<body>

<header>
  <div class="logo">Ex<span>sisto</span> · Image Library Review</div>
  <div class="header-right">
    <div class="flag-count" id="flag-count">0 flagged</div>
    <button class="export-btn" onclick="openExport()">Export Flagged →</button>
  </div>
</header>

<div class="stats-bar">
  <div class="stat">Total: <strong id="stat-total">0</strong></div>
  <div class="stat green">Approved: <strong id="stat-approved">0</strong></div>
  <div class="stat red">Flagged: <strong id="stat-flagged">0</strong></div>
  <div class="stat">Unreviewed: <strong id="stat-unreviewed">0</strong></div>
</div>

<div class="filterbar">
  <span class="fb-label">Filter:</span>
  <button class="fb-btn active" onclick="setFilter('all',this)">All</button>
  <button class="fb-btn flagged-filter" onclick="setFilter('flagged',this)">🚩 Flagged</button>
  <button class="fb-btn" onclick="setFilter('approved',this)">✅ Approved</button>
  <button class="fb-btn" onclick="setFilter('unreviewed',this)">⬜ Unreviewed</button>
  <div class="sep"></div>
  <span class="fb-label">Industry:</span>
  <div id="industry-filters"></div>
</div>

<div class="content" id="content"></div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <img id="lb-img" src="" alt=""/>
  <div class="lb-actions" onclick="event.stopPropagation()">
    <button class="lb-btn lb-approve" onclick="lbAction('approved')">✅ Approve</button>
    <button class="lb-btn lb-flag" onclick="lbAction('flagged')">🚩 Flag for replacement</button>
    <button class="lb-btn lb-skip" onclick="closeLightbox()">Skip</button>
  </div>
</div>

<!-- Export Modal -->
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeExport()">
  <div class="modal">
    <div class="modal-title">🚩 Flagged Images Report</div>
    <div class="modal-sub" id="modal-sub"></div>
    <div id="modal-body"></div>
    <button class="copy-btn" onclick="copyReport()">📋 Copy JSON (paste to Claude for regeneration)</button>
    <button class="modal-close" onclick="closeExport()">Close</button>
  </div>
</div>

const LABELS = {"auto": "\ud83d\ude97 Auto", "bakery": "\ud83e\udd50 Bakery", "dental": "\ud83e\uddb7 Dental", "gym": "\ud83d\udcaa Gym", "hvac": "\u2744\ufe0f HVAC", "landscaping": "\ud83c\udf3f Landscaping", "law": "\u2696\ufe0f Law", "pet": "\ud83d\udc3e Pet", "plumbing": "\ud83d\udd27 Plumbing", "realestate": "\ud83c\udfe0 Real Estate", "restaurant": "\ud83c\udf5d Restaurant", "salon": "\u2702\ufe0f Salon"};

const state = {};
let curFilter = 'all';
let curIndustry = 'all';
let lbInd = null, lbIdx = null;

try { const s = localStorage.getItem('exsisto-lib-review'); if(s) Object.assign(state, JSON.parse(s)); } catch(e){}
function save() { try { localStorage.setItem('exsisto-lib-review', JSON.stringify(state)); } catch(e){} }
function key(ind,i) { return ind+'-'+i; }

function setState(ind,i,val) {
  const k = key(ind,i);
  state[k] = state[k]===val ? null : val;
  save(); updateCard(ind,i); updateStats();
}

function updateCard(ind,i) {
  const k = key(ind,i); const s = state[k];
  const card = document.getElementById('card-'+k);
  if(!card) return;
  card.classList.remove('flagged','approved');
  if(s==='flagged') card.classList.add('flagged');
  if(s==='approved') card.classList.add('approved');
  let show = true;
  if(curFilter==='flagged' && s!=='flagged') show=false;
  if(curFilter==='approved' && s!=='approved') show=false;
  if(curFilter==='unreviewed' && s!==null) show=false;
  if(curIndustry!=='all' && ind!==curIndustry) show=false;
  card.classList.toggle('hidden',!show);
  const badge = card.querySelector('.status-badge');
  badge.textContent = s==='flagged'?'🚩 Flagged':s==='approved'?'✅ Approved':'';
  badge.className = 'status-badge '+(s||'');
  card.querySelector('.flag-btn').classList.toggle('active',s==='flagged');
  card.querySelector('.approve-btn').classList.toggle('active',s==='approved');
}

function updateStats() {
  let total=0,flagged=0,approved=0;
  Object.keys(MANIFEST).forEach(ind=>{
    MANIFEST[ind].forEach((_,i)=>{
      total++;
      const s=state[key(ind,i)];
      if(s==='flagged') flagged++;
      if(s==='approved') approved++;
    });
    let fc=0; MANIFEST[ind].forEach((_,i)=>{if(state[key(ind,i)]==='flagged')fc++;});
    const el=document.getElementById('fc-'+ind);
    if(el){el.textContent='🚩 '+fc;el.classList.toggle('visible',fc>0);}
  });
  document.getElementById('stat-total').textContent=total;
  document.getElementById('stat-flagged').textContent=flagged;
  document.getElementById('stat-approved').textContent=approved;
  document.getElementById('stat-unreviewed').textContent=total-flagged-approved;
  document.getElementById('flag-count').textContent=flagged+' flagged';
}

function setFilter(f,btn) {
  curFilter=f;
  document.querySelectorAll('.fb-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  rebuildVisibility();
}
function setIndustryFilter(ind,btn) {
  curIndustry=ind;
  document.querySelectorAll('.fb-btn[data-ind]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  rebuildVisibility();
}
function rebuildVisibility() {
  Object.keys(MANIFEST).forEach(ind=>{
    MANIFEST[ind].forEach((_,i)=>updateCard(ind,i));
    const sec=document.getElementById('sec-'+ind);
    if(sec) sec.style.display=(curIndustry==='all'||curIndustry===ind)?'':'none';
  });
}

// Lightbox
function openLightbox(ind,i) {
  lbInd=ind; lbIdx=i;
  document.getElementById('lb-img').src=MANIFEST[ind][i];
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); lbInd=null; lbIdx=null; }
function lbAction(val) { if(lbInd!==null) setState(lbInd,lbIdx,val); closeLightbox(); }

function build() {
  // Industry filters
  const indFilters = document.getElementById('industry-filters');
  const allBtn = document.createElement('button');
  allBtn.className='fb-btn active'; allBtn.dataset.ind='all'; allBtn.textContent='All';
  allBtn.onclick=()=>setIndustryFilter('all',allBtn); indFilters.appendChild(allBtn);
  Object.keys(MANIFEST).sort().forEach(ind=>{
    const btn=document.createElement('button');
    btn.className='fb-btn'; btn.dataset.ind=ind; btn.textContent=LABELS[ind]||ind;
    btn.onclick=()=>setIndustryFilter(ind,btn); indFilters.appendChild(btn);
  });

  // Content
  const content=document.getElementById('content');
  Object.keys(MANIFEST).sort().forEach(ind=>{
    const imgs=MANIFEST[ind];
    const sec=document.createElement('div');
    sec.className='industry-section'; sec.id='sec-'+ind;
    sec.innerHTML=`<div class="industry-header">
      <span class="industry-title">${LABELS[ind]||ind}</span>
      <span class="industry-count">${imgs.length} image${imgs.length!==1?'s':''}</span>
      <span class="industry-flag-count" id="fc-${ind}"></span>
    </div><div class="img-grid" id="grid-${ind}"></div>`;
    content.appendChild(sec);

    const grid=sec.querySelector('#grid-'+ind);
    imgs.forEach((url,i)=>{
      const k=key(ind,i); const s=state[k];
      const card=document.createElement('div');
      card.className='img-card'+(s==='flagged'?' flagged':s==='approved'?' approved':'');
      card.id='card-'+k;
      card.innerHTML=`
        <div class="img-wrap" style="cursor:zoom-in" onclick="openLightbox('${ind}',${i})">
          <img src="${url}" loading="lazy" onerror="this.style.background='#1a1a24';this.style.height='180px';this.removeAttribute('src')"/>
          <div class="status-badge ${s||''}">${s==='flagged'?'🚩 Flagged':s==='approved'?'✅ Approved':''}</div>
        </div>
        <div class="img-info">
          <div class="img-meta">
            <div class="img-industry">${ind}</div>
            <div class="img-num">img_${i+1}</div>
          </div>
          <div class="action-btns">
            <button class="action-btn approve-btn${s==='approved'?' active':''}" title="Approve" onclick="setState('${ind}',${i},'approved')">✅</button>
            <button class="action-btn flag-btn${s==='flagged'?' active':''}" title="Flag" onclick="setState('${ind}',${i},'flagged')">🚩</button>
          </div>
        </div>`;
      grid.appendChild(card);
    });
  });
  updateStats();
}

function openExport() {
  const flagged=[];
  Object.keys(MANIFEST).forEach(ind=>{
    MANIFEST[ind].forEach((url,i)=>{
      if(state[key(ind,i)]==='flagged') flagged.push({industry:ind,index:i+1,url});
    });
  });
  const modal=document.getElementById('modal-bg');
  document.getElementById('modal-sub').textContent=flagged.length+' image'+(flagged.length!==1?'s':'')+' flagged across '+[...new Set(flagged.map(f=>f.industry))].length+' industries';
  if(flagged.length===0) {
    document.getElementById('modal-body').innerHTML='<div class="empty-flags">No images flagged yet. Click 🚩 on any image or open it to flag.</div>';
  } else {
    const byInd={};
    flagged.forEach(f=>{if(!byInd[f.industry])byInd[f.industry]=[];byInd[f.industry].push(f);});
    document.getElementById('modal-body').innerHTML=Object.entries(byInd).map(([ind,items])=>`
      <div style="margin-bottom:16px">
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim);margin-bottom:8px">${LABELS[ind]||ind} — ${items.length} to replace</div>
        ${items.map(item=>`<div class="flag-item"><img src="${item.url}"/><div class="flag-item-info"><div class="flag-item-ind">${ind} · Image ${item.index}</div><div class="flag-item-url">${item.url.slice(0,70)}…</div></div></div>`).join('')}
      </div>`).join('');
  }
  modal.classList.add('open');
}
function closeExport() { document.getElementById('modal-bg').classList.remove('open'); }
function copyReport() {
  const flagged={};
  Object.keys(MANIFEST).forEach(ind=>{
    MANIFEST[ind].forEach((url,i)=>{
      if(state[key(ind,i)]==='flagged') {
        if(!flagged[ind]) flagged[ind]=[];
        flagged[ind].push({index:i+1,url,action:'regenerate'});
      }
    });
  });
  navigator.clipboard.writeText(JSON.stringify(flagged,null,2)).then(()=>{
    const btn=document.querySelector('.copy-btn');
    btn.textContent='✓ Copied!';
    setTimeout(()=>btn.textContent='📋 Copy JSON (paste to Claude for regeneration)',2000);
  });
}

build();
</script>
