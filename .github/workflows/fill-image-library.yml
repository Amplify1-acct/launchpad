name: 🍌 Fill Industry Image Library

on:
  workflow_dispatch:
    inputs:
      industries:
        description: 'Industries to fill (space-separated, or "all")'
        required: false
        default: 'all'
        type: string

jobs:
  fill:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fill industry image library
        env:
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          INDUSTRIES="${{ github.event.inputs.industries }}"
          if [ "$INDUSTRIES" = "all" ] || [ -z "$INDUSTRIES" ]; then
            python fill_image_library.py
          else
            python fill_image_library.py $INDUSTRIES
          fi
