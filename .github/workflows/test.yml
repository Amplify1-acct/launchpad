name: Test & Deploy

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}

      - name: Run Playwright tests
        run: npx playwright test
        env:
          TEST_URL: ""

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  notify-on-failure:
    name: Notify on failure
    needs: test
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Create failure summary
        run: |
          echo "## ❌ Tests Failed" >> $GITHUB_STEP_SUMMARY
          echo "Tests failed on branch **${{ github.ref_name }}**" >> $GITHUB_STEP_SUMMARY
          echo "Check the Playwright report artifact above for details." >> $GITHUB_STEP_SUMMARY
          echo "**Fix the tests before merging to main.**" >> $GITHUB_STEP_SUMMARY
