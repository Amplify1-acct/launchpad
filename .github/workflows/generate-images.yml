name: 🍌 Nano Banana Image Generator

on:
  workflow_dispatch:
    inputs:
      industries:
        description: 'Industries to generate (space-separated, or "all")'
        required: false
        default: 'all'
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run Nano Banana Generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          INDUSTRIES="${{ github.event.inputs.industries }}"
          if [ "$INDUSTRIES" = "all" ] || [ -z "$INDUSTRIES" ]; then
            python generate_images.py
          else
            python generate_images.py $INDUSTRIES
          fi
